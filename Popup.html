<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #334155; }
    .container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
    
    .header { display: flex; align-items: center; gap: 12px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 20px; margin-bottom: 25px; }
    .header span { font-size: 32px; }
    .header h2 { margin: 0; color: #0f172a; font-weight: 900; font-size: 24px; letter-spacing: -0.5px; }

    .section-title { font-size: 14px; color: #ec4899; font-weight: 900; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .box-original { background: #e0f2fe; padding: 20px; border-radius: 12px; margin-bottom: 30px; font-size: 18px; font-weight: 900; color: #0284c7; }
    
    textarea.main-editor { width: 100%; height: 380px; padding: 25px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; font-family: inherit; resize: vertical; outline: none; box-sizing: border-box; background: #ffffff; line-height: 1.8; color: #1e293b; transition: 0.2s;}
    textarea.main-editor:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
    
    textarea.magic-input { width: 100%; height: 80px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; font-family: inherit; resize: none; outline: none; box-sizing: border-box; background: #f8fafc; margin-bottom: 20px; }
    textarea.magic-input:focus { border-color: #8b5cf6; background: white; }

    .btn-group { display: flex; gap: 10px; }
    button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; }
    
    .btn-auto { background: #f1f5f9; color: #475569; border: 2px solid #cbd5e1; }
    .btn-auto:hover { background: #e2e8f0; }
    .btn-magic { background: linear-gradient(135deg, #a855f7, #7e22ce); color: white; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
    .btn-magic:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4); }
    .btn-save { background: linear-gradient(135deg, #10b981, #047857); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
    
    .loading { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span>🦜</span><h2>Parrot Teacher Desk</h2>
    </div>

    <div class="section-title">📝 STUDENT'S SENTENCE</div>
    <div class="box-original" id="originalText"><?= sentence ?></div>

    <div class="section-title">👩‍🏫 TEACHER'S FEEDBACK & EDIT</div>
    <textarea id="aiText" class="main-editor"></textarea>
    
    <div class="section-title" style="margin-top:25px; color:#8b5cf6;">✨ MAGIC PEN INPUT</div>
    <textarea id="teacherNote" class="magic-input" placeholder="AI 매직펜에게 부탁할 내용을 적어주세요. (예: cloudy 예문 하나 더 만들어줘)"></textarea>

    <div class="btn-group">
      <button class="btn-auto" id="btnAuto" onclick="runAutoCorrection()">🤖 AI 자동 첨삭</button>
      <button class="btn-magic" id="btnMagic" onclick="runMagicPen()">✨ AI 매직 펜 작동</button>
      <button class="btn-save" id="btnSave" onclick="saveFeedback()">💾 첨삭 완료 및 저장</button>
    </div>
  </div>

  <script>
    const row = <?= row ?>;
    const studentSentence = <?= JSON.stringify(sentence) ?>; 
    const aiRawText = <?= JSON.stringify(feedback) ?>; 

function formatJsonToMarkdown(rawJsonStr) {
      try {
        // 1차 방어: 쓸데없는 백틱이나 텍스트 찌꺼기 제거
        let cleanJsonStr = rawJsonStr.replace(/```json/gi, '').replace(/```/gi, '').trim();
        // 2차 방어: 혹시 AI가 맨 앞에 글자를 붙였을 경우 중괄호부터 시작하도록 자르기
        const startIndex = cleanJsonStr.indexOf('{');
        const endIndex = cleanJsonStr.lastIndexOf('}');
        if (startIndex !== -1 && endIndex !== -1) {
            cleanJsonStr = cleanJsonStr.substring(startIndex, endIndex + 1);
        }

        const data = JSON.parse(cleanJsonStr);
        
        let md = `### ⭕ Corrected (교정된 문장)\n`;
        
        if (data.corrected_lines && Array.isArray(data.corrected_lines)) {
          md += data.corrected_lines.join('\n') + `\n\n`;
        } else {
          md += `(완벽한 문장입니다!)\n\n`;
        }

        md += `### 👩‍🏫 Mom's Guide (어머니, 이렇게 지도해 주세요!)\n- ${data.mom_guide || "아이가 쓴 문장을 문법에 맞게 자연스럽게 고쳤어요."}\n\n`;
        
        if (data.vivid_expression && data.vivid_expression.expression) {
          md += `### 💡 Vivid Expression (더 생생한 원어민 표현)\n- **Expression:** "${data.vivid_expression.expression}"\n- **Why?:** ${data.vivid_expression.why || ""}\n\n`;
        }
        
        md += `### 📖 Vocabulary (핵심 영단어)\n`;
        if (data.expression) {
          for (let key in data.expression) {
            md += `- **${key}**: ${data.expression[key]}\n`;
          }
        }
        
        md += `\n### 🪄 Teacher's Extra Note (패럿 선생님의 한마디)\n- ${data.tip || "🌟 당신의 노력과 열정이 빛나고 있어요! 계속 멋진 모습 보여주세요! 💖"}\n`;
        
        return md;
      } catch(e) {
        // 3차 방어: 파싱에 완전히 실패해도 원문을 그대로 살려주고 빨간 에러는 숨김
        return "### 🤖 AI Raw Feedback\n" + rawJsonStr; 
      }
    }

    window.onload = function() {
      document.getElementById('aiText').value = formatJsonToMarkdown(aiRawText);
    };

    function runAutoCorrection() {
      const btn = document.getElementById('btnAuto');
      const mainEditor = document.getElementById('aiText');
      btn.classList.add('loading');
      btn.innerHTML = '🤖 첨삭 다시 하는 중...';
      google.script.run
        .withSuccessHandler(function(result) {
          mainEditor.value = formatJsonToMarkdown(result);
          btn.classList.remove('loading');
          btn.innerHTML = '🤖 AI 자동 첨삭';
        })
        .runFullAutoCorrection(studentSentence);
    }

    function runMagicPen() {
      const btn = document.getElementById('btnMagic');
      const noteInput = document.getElementById('teacherNote');
      const mainEditor = document.getElementById('aiText');
      const prompt = noteInput.value.trim();
      if (!prompt) { alert('매직펜 창에 선생님의 짧은 메모를 먼저 적어주세요! 🦜'); return; }
      btn.classList.add('loading');
      btn.innerHTML = '✨ 마법 부리는 중...';
      google.script.run
        .withSuccessHandler(function(result) {
          // 💡 매직펜의 결과가 군더더기 없이 메인 에디터 하단에 추가됩니다.
          mainEditor.value = mainEditor.value + "\n\n### ✨ Magic Pen's Extra\n" + result.trim();
          noteInput.value = ""; 
          btn.classList.remove('loading');
          btn.innerHTML = '✨ AI 매직 펜 작동';
        })
        .runTeacherAssistant(prompt);
    }

    function saveFeedback() {
      const btn = document.getElementById('btnSave');
      const mainEditor = document.getElementById('aiText');
      btn.classList.add('loading');
      btn.innerHTML = '💾 저장 중...';
      google.script.run
        .withSuccessHandler(function(msg) {
          alert(msg);
          google.script.host.close();
        })
        .updateFeedback(row, mainEditor.value);
    }
  </script>
</body>
</html>
